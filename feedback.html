<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TravelNest — Feedback & FAQ">
  <title>TravelNest — Feedback</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
  <style>
    .fb-layout {
      display: grid;
      grid-template-columns: 480px 1fr;
      gap: 0;
      max-width: 1160px;
      margin: 0 auto;
      min-height: calc(100vh - 200px);
    }
    .fb-col {
      padding: 40px 36px;
      border-right: 1px solid var(--border);
    }
    .fb-col:last-child { border-right: none; }
    .col-label {
      font-size: 0.72rem; font-weight:600; letter-spacing:0.12em;
      text-transform:uppercase; color:var(--muted);
      margin-bottom:20px; padding-bottom:14px;
      border-bottom:1px solid var(--border);
    }
    @media (max-width:860px) {
      .fb-layout { grid-template-columns:1fr; }
      .fb-col { border-right:none; border-bottom:1px solid var(--border); }
    }
  </style>
</head>
<body>

  <div class="masthead">
    <span class="eyebrow">Get in Touch</span>
    <h1>Feedback &amp; FAQ</h1>
    <p>Share your thoughts or find answers to common questions below.</p>
  </div>

  <div class="fb-layout">
    <!-- Form -->
    <div class="fb-col">
      <div class="col-label">Send Feedback</div>
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="fb-name" placeholder="e.g. Jane Smith">
        <div class="form-error" id="err-name">Please enter your name.</div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="fb-email" placeholder="you@example.com">
        <div class="form-error" id="err-email">Please enter a valid email.</div>
      </div>
      <div class="form-group">
        <label>Personal Address</label>
        <input type="pmail" id="pb-email" placeholder="personal@mail.com">
        <div class="form-error" id="err-email">Please enter a valid email.</div>
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea id="fb-msg" placeholder="What's on your mind?"></textarea>
        <div class="form-error" id="err-msg">Message must be at least 10 characters.</div>
      </div>
      <button class="btn btn-primary" onclick="submitFeedback()" style="width:100%;justify-content:center;">Send Message →</button>

      <!-- Confirmation -->
      <div id="fb-confirm" style="display:none;margin-top:20px;padding:18px;border:1px solid var(--red-dim);background:var(--red-glow);border-left:3px solid var(--red);border-radius:2px;">
        <h3 style="color:var(--white);font-size:0.9rem;margin-bottom:4px;">Message received</h3>
        <p id="fb-confirm-text" style="font-size:0.83rem;"></p>
      </div>
    </div>

    <!-- FAQ -->
    <div class="fb-col">
      <div class="col-label">Frequently Asked Questions</div>
      <div id="faq-container"></div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/components.js"></script>
  <script>
    function submitFeedback() {
      document.querySelectorAll('.form-error').forEach(e => e.classList.remove('visible'));
      document.querySelectorAll('.form-group input, .form-group textarea').forEach(e => e.classList.remove('error'));
      document.getElementById('fb-confirm').style.display = 'none';

      const name  = document.getElementById('fb-name').value.trim();
      const email = document.getElementById('fb-email').value.trim();
      const pmail = document.getElementById('pb-email').value.trim()
      const msg   = document.getElementById('fb-msg').value.trim();
      let ok = true;

      if (!name)  { document.getElementById('err-name').classList.add('visible'); document.getElementById('fb-name').classList.add('error'); ok=false; }
      if (!email || !email.includes('@') || !email.includes('.')) { document.getElementById('err-email').classList.add('visible'); document.getElementById('fb-email').classList.add('error'); ok=false; }
      if (!pmail || !pmail.includes('@') || !pmail.includes('.')) { document.getElementById('err-email').classList.add('visible'); document.getElementById('pb-email').classList.add('error'); ok=false; }
      if (msg.length < 10) { document.getElementById('err-msg').classList.add('visible'); document.getElementById('fb-msg').classList.add('error'); ok=false; }
      if (!ok) return;

      const feedbacks = loadFromStorage('tn_feedbacks', []);
      feedbacks.push({ name, email, pmail, msg, date: new Date().toLocaleDateString() });
      saveToStorage('tn_feedbacks', feedbacks);

      document.getElementById('fb-confirm-text').textContent = 'Thanks, ' + name + '! We got your message.';
      document.getElementById('fb-confirm').style.display = 'block';
      document.getElementById('fb-name').value = '';
      document.getElementById('fb-email').value = '';
      document.getElementById('fb-msg').value = '';
    }

    const FAQS = [
      { q: 'Is TravelNest free to use?', a: 'Yes, TravelNest is completely free. All features — browsing, budgeting, wishlist, trip generation — are available at no cost.' },
      { q: 'How does Destination of the Day work?', a: 'It uses the current date to select a destination from our list, so it changes every day and is consistent for all users on the same day.' },
      { q: 'Where is my data stored?', a: 'Everything — your wishlist, saved trips, visited destinations, and feedback — is stored locally in your browser\'s localStorage. No data is sent to any server.' },
      { q: 'Can I install TravelNest on my phone?', a: 'Yes! TravelNest is a Progressive Web App (PWA). On mobile, use your browser\'s "Add to Home Screen" option. On desktop, look for the install icon in the address bar.' },
      { q: 'How does the budget calculator categorise spending?', a: 'Under $50/day is Budget, $50–$150/day is Mid-range, and above $150/day is Luxury. The progress bar changes colour to reflect your tier.' },
      { q: 'How does the ambient sound feature work?', a: 'Sounds are generated using the Web Audio API — they\'re synthesised tones, not recordings. They simulate the character of each environment. No audio files are downloaded.' },
      { q: 'How do I clear my saved data?', a: 'Each page has a clear button for its specific data. To wipe everything, you can clear your browser\'s localStorage via browser settings → Privacy → Clear browsing data.' },
    ];

    const container = document.getElementById('faq-container');
    FAQS.forEach((faq, i) => {
      const div = document.createElement('div');
      div.className = 'accordion-item';
      div.innerHTML = `
        <button class="accordion-btn" onclick="toggleFaq(${i})">
          <span>${faq.q}</span>
          <span class="chevron" id="chev-${i}">▾</span>
        </button>
        <div class="accordion-body" id="faq-${i}">${faq.a}</div>
      `;
      container.appendChild(div);
    });

    function toggleFaq(i) {
      const body = document.getElementById('faq-' + i);
      const btn  = body.previousElementSibling;
      const open = body.classList.contains('open');
      // Close all
      document.querySelectorAll('.accordion-body').forEach(b => b.classList.remove('open'));
      document.querySelectorAll('.accordion-btn').forEach(b => b.classList.remove('open'));
      // Open this one (if it was closed)
      if (!open) { body.classList.add('open'); btn.classList.add('open'); }
    }
  </script>
</body>
</html>
